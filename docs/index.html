<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finverse — Workflow Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAFAF8;
      --surface: #FFFFFF;
      --surface-hover: #F5F5F0;
      --border: #E2E0DA;
      --border-hover: #C5C3BB;
      --text: #3C3C3C;
      --text-muted: #8A8880;
      --olive: #7BAA00;
      --olive-dark: #5C8200;
      --olive-dim: rgba(123, 170, 0, 0.07);
      --olive-glow: rgba(123, 170, 0, 0.14);
      --charcoal: #4A4A4A;
      --radius: 12px;
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 40px;
      position: relative;
    }

    /* Subtle top accent line */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--charcoal) 0%, var(--olive) 50%, var(--charcoal) 100%);
      z-index: 10;
    }

    /* Light grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .portal { position: relative; z-index: 1; width: 100%; max-width: 580px; }

    /* Logo */
    .logo-wrap {
      margin-bottom: 6px;
      animation: fadeIn 0.6s ease-out;
    }

    .logo-wrap img {
      height: 44px;
      width: auto;
      display: block;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 40px;
      animation: fadeIn 0.6s ease-out 0.1s both;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle::before {
      content: '';
      width: 16px;
      height: 1px;
      background: var(--olive);
      flex-shrink: 0;
    }

    /* Workflow Cards */
    .workflows {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .flow-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.5s ease-out both;
    }

    .flow-card:nth-child(1) { animation-delay: 0.15s; }
    .flow-card:nth-child(2) { animation-delay: 0.22s; }
    .flow-card:nth-child(3) { animation-delay: 0.29s; }
    .flow-card:nth-child(4) { animation-delay: 0.36s; }

    .flow-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--olive);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .flow-card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      transform: translateX(3px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .flow-card:hover::before { opacity: 1; }
    .flow-card:hover .flow-icon { background: var(--olive); color: #fff; }
    .flow-card:hover .flow-arrow { opacity: 1; transform: translateX(0); color: var(--olive); }

    .flow-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--olive-dim);
      color: var(--olive);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s ease;
      position: relative;
      z-index: 1;
    }

    .flow-info {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .flow-name {
      font-family: 'Anybody', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.2px;
      color: var(--charcoal);
      margin-bottom: 2px;
    }

    .flow-desc {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .flow-arrow {
      font-size: 18px;
      color: var(--text-muted);
      opacity: 0;
      transform: translateX(-6px);
      transition: all 0.25s ease;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    .flow-tag {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 3px 7px;
      border-radius: 4px;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    .tag-active { background: var(--olive-dim); color: var(--olive-dark); }
    .tag-soon { background: rgba(0,0,0,0.04); color: var(--text-muted); }

    /* Divider */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 16px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      animation: fadeIn 0.6s ease-out 0.3s both;
    }

    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.5;
      animation: fadeIn 0.6s ease-out 0.5s both;
    }

    .footer span { color: var(--olive); }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      body { padding: 40px 16px 32px; }
      .flow-card { padding: 14px 16px; gap: 12px; }
      .flow-name { font-size: 14px; }
      .logo-wrap img { height: 36px; }
    }
  </style>
</head>
